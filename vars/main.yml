---
# Paths (user-level, shared with toolboxes)
# Used by roles that need these; role defaults can override version-specific vars
local_bin: "{{ ansible_env.HOME }}/.local/bin"
local_share_apps: "{{ ansible_env.HOME }}/.local/share/applications"
applications_dir: "{{ ansible_env.HOME }}/Applications"
bashrc: "{{ ansible_env.HOME }}/.bashrc"
