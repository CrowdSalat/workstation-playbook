---
- name: Detect Chromium app bundles on macOS
  ansible.builtin.stat:
    path: "{{ chromium_app_path }}"
  loop: "{{ tool_chromium_macos_app_paths }}"
  loop_control:
    loop_var: chromium_app_path
  register: tool_chromium_macos_app_stats
  changed_when: false

- name: Resolve Chromium app path on macOS
  ansible.builtin.set_fact:
    tool_chromium_macos_app_path: >-
      {{
        (tool_chromium_macos_app_stats.results
        | selectattr('stat.exists')
        | map(attribute='stat.path')
        | list
        | first) | default('')
      }}
  changed_when: false

- name: Verify Chromium app signature on macOS
  ansible.builtin.command:
    argv:
      - codesign
      - --verify
      - --deep
      - --strict
      - --verbose=2
      - "{{ tool_chromium_macos_app_path }}"
  register: tool_chromium_macos_signature_check
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - tool_chromium_macos_app_path | length > 0

- name: Uninstall broken Chromium cask on macOS
  community.general.homebrew_cask:
    name: chromium
    state: absent
    accept_external_apps: true
  when:
    - not ansible_check_mode
    - tool_chromium_macos_signature_check is defined
    - tool_chromium_macos_signature_check.rc != 0
  environment:
    PATH: "{{ ansible_facts['env']['PATH'] }}:/opt/homebrew/bin:/usr/local/bin"

- name: Reinstall Chromium cask on macOS
  community.general.homebrew_cask:
    name: chromium
    state: present
    accept_external_apps: true
  when:
    - not ansible_check_mode
    - tool_chromium_macos_signature_check is defined
    - tool_chromium_macos_signature_check.rc != 0
  environment:
    PATH: "{{ ansible_facts['env']['PATH'] }}:/opt/homebrew/bin:/usr/local/bin"

- name: Refresh Chromium app bundle detection after reinstall
  ansible.builtin.stat:
    path: "{{ chromium_app_path }}"
  loop: "{{ tool_chromium_macos_app_paths }}"
  loop_control:
    loop_var: chromium_app_path
  register: tool_chromium_macos_app_stats
  changed_when: false
  when:
    - not ansible_check_mode
    - tool_chromium_macos_signature_check is defined
    - tool_chromium_macos_signature_check.rc != 0

- name: Check quarantine attribute on Chromium app bundle (macOS)
  ansible.builtin.command:
    argv:
      - xattr
      - -p
      - com.apple.quarantine
      - "{{ chromium_app.stat.path }}"
  loop: "{{ tool_chromium_macos_app_stats.results | default([]) }}"
  loop_control:
    loop_var: chromium_app
  when: chromium_app.stat.exists | default(false)
  register: tool_chromium_macos_quarantine_checks
  changed_when: false
  failed_when: false

- name: Remove quarantine attribute from Chromium app bundle (macOS)
  ansible.builtin.command:
    argv:
      - xattr
      - -dr
      - com.apple.quarantine
      - "{{ chromium_quarantine_check.chromium_app.stat.path }}"
  loop: "{{ tool_chromium_macos_quarantine_checks.results | default([]) }}"
  loop_control:
    loop_var: chromium_quarantine_check
  when:
    - chromium_quarantine_check.rc is defined
    - chromium_quarantine_check.rc == 0

- name: Ensure Chromium external extension directory exists (macOS)
  ansible.builtin.file:
    path: "{{ tool_chromium_macos_external_extensions_dir }}"
    state: directory
    mode: "0755"

- name: Install Chromium extension manifests (macOS)
  ansible.builtin.copy:
    dest: "{{ tool_chromium_macos_external_extensions_dir }}/{{ chromium_extension.chromium_id }}.json"
    mode: "0644"
    content: |
      {
        "external_update_url": "{{ chromium_extension.chromium_update_url }}"
      }
  loop: "{{ tool_chromium_extensions }}"
  loop_control:
    loop_var: chromium_extension
