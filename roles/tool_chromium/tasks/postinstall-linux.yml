---
- name: Ensure Chromium external extension directory exists (Linux)
  ansible.builtin.file:
    path: "{{ tool_chromium_linux_external_extensions_dir }}"
    state: directory
    mode: "0755"

- name: Install Chromium extension manifests (Linux)
  ansible.builtin.copy:
    dest: "{{ tool_chromium_linux_external_extensions_dir }}/{{ chromium_extension.chromium_id }}.json"
    mode: "0644"
    content: |
      {
        "external_update_url": "{{ chromium_extension.chromium_update_url }}"
      }
  loop: "{{ tool_chromium_extensions }}"
  loop_control:
    loop_var: chromium_extension
