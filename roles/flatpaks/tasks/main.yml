---
# Tag split: `flatpaks` = install only; `flatpaks_remove` = uninstall only (see defaults).
- name: Import Flatpak install tasks
  ansible.builtin.import_tasks: install.yml
  tags:
    - flatpaks

- name: Import Flatpak remove tasks
  ansible.builtin.import_tasks: remove.yml
  tags:
    - never
    - flatpaks_remove
