---
# Per-user Flatpak install (~/.local/share/flatpak); no sudo.
- name: Ensure Flathub remote exists (user)
  community.general.flatpak_remote:
    name: "{{ flatpak_flathub_remote_name }}"
    flatpakrepo_url: "{{ flatpak_flathub_repo_url }}"
    method: user
    state: present

- name: Install Flatpaks (user)
  community.general.flatpak:
    name: "{{ item }}"
    state: present
    method: user
  loop: "{{ flatpak_packages }}"
