---
package_manager_npm_node_version: "lts/*"
package_manager_npm_packages: []
package_manager_npm_nvm_version: "v0.40.3"
package_manager_npm_nvm_install_url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ package_manager_npm_nvm_version }}/install.sh"
package_manager_npm_nvm_dir: "{{ ansible_facts['env']['HOME'] }}/.nvm"
package_manager_npm_bashrc: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
package_manager_npm_zshrc: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
