---
- name: Ensure Chromium external extension directory exists (Linux)
  ansible.builtin.file:
    path: "{{ tool_browser_linux_chromium_external_extensions_dir }}"
    state: directory
    mode: "0755"

- name: Install Chromium extension manifests (Linux)
  ansible.builtin.copy:
    dest: "{{ tool_browser_linux_chromium_external_extensions_dir }}/{{ chromium_extension.chromium_id }}.json"
    mode: "0644"
    content: |
      {
        "external_update_url": "{{ chromium_extension.chromium_update_url }}"
      }
  loop: "{{ tool_browser_chromium_extensions }}"
  loop_control:
    loop_var: chromium_extension

- name: Discover Firefox profiles (Linux)
  ansible.builtin.find:
    paths: "{{ tool_browser_linux_firefox_profiles_dir }}"
    file_type: directory
    patterns:
      - "*.default*"
      - "*.default-release*"
    use_regex: false
  register: tool_browser_firefox_profiles_linux
  failed_when: false
  changed_when: false

- name: Ensure Firefox extension directory exists in each profile (Linux)
  ansible.builtin.file:
    path: "{{ firefox_profile.path }}/extensions"
    state: directory
    mode: "0755"
  loop: "{{ tool_browser_firefox_profiles_linux.files | default([]) }}"
  loop_control:
    loop_var: firefox_profile

- name: Configure Firefox new-tab preferences (Linux)
  ansible.builtin.blockinfile:
    path: "{{ firefox_profile.path }}/user.js"
    marker: "// {mark} ANSIBLE MANAGED - tool_browser new tab"
    create: true
    block: "{{ tool_browser_firefox_user_prefs | join('\n') }}"
    insertafter: EOF
  loop: "{{ tool_browser_firefox_profiles_linux.files | default([]) }}"
  loop_control:
    loop_var: firefox_profile
  when: tool_browser_firefox_user_prefs | length > 0

- name: Install Firefox extensions in profiles (Linux)
  ansible.builtin.get_url:
    url: "{{ firefox_extension_pair.1.firefox_xpi_url }}"
    dest: "{{ firefox_extension_pair.0.path }}/extensions/{{ firefox_extension_pair.1.firefox_id }}.xpi"
    mode: "0644"
  loop: "{{ (tool_browser_firefox_profiles_linux.files | default([])) | product(tool_browser_firefox_extensions) | list }}"
  loop_control:
    loop_var: firefox_extension_pair
  when: not ansible_check_mode
  failed_when: false
