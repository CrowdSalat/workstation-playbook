---
# Ensure the named toolbox exists.
- name: Check existing toolboxes
  ansible.builtin.command: toolbox list --containers
  register: toolbox_list
  changed_when: false
  tags: toolbox

- name: Create toolbox
  ansible.builtin.command: toolbox create --container {{ toolbox_name }}
  when: toolbox_name not in toolbox_list.stdout
  tags: toolbox

- name: Install dnf packages in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    sudo dnf install -y {{ toolbox_dnf_packages | join(' ') }}
  register: dnf_result
  changed_when: "'Nothing to do.' not in dnf_result.stdout"
  tags: toolbox

# npm list -g exits 0 when the package is present, non-zero when absent.
- name: Check npm packages in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    npm list -g --depth=0 {{ item }}
  loop: "{{ toolbox_npm_packages }}"
  register: npm_check
  changed_when: false
  failed_when: false
  tags: toolbox

- name: Install missing npm packages globally in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    sudo npm install -g {{ item.item }}
  loop: "{{ npm_check.results }}"
  when: item.rc != 0
  changed_when: true
  tags: toolbox

