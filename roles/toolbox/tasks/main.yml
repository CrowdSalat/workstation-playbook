---
# Ensure the named toolbox exists.
- name: Check existing toolboxes
  ansible.builtin.command: toolbox list --containers
  register: toolbox_list
  changed_when: false
  tags: toolbox

- name: Create toolbox
  ansible.builtin.command: toolbox create --container {{ toolbox_name }}
  when: toolbox_name not in toolbox_list.stdout
  tags: toolbox

- name: Install dnf packages in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    sudo dnf install -y {{ toolbox_dnf_packages | join(' ') }}
  register: dnf_result
  changed_when: "'Nothing to do.' not in dnf_result.stdout"
  tags: toolbox

# npm list -g exits 0 when the package is present, non-zero when absent.
- name: Check npm packages in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    npm list -g --depth=0 {{ item }}
  loop: "{{ toolbox_npm_packages }}"
  register: npm_check
  changed_when: false
  failed_when: false
  tags: toolbox

- name: Install missing npm packages globally in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    sudo npm install -g {{ item.item }}
  loop: "{{ npm_check.results }}"
  when: item.rc != 0
  changed_when: true
  tags: toolbox

# pip show exits 0 when the package is present, non-zero when absent.
- name: Check pip packages in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    pip show {{ item }}
  loop: "{{ toolbox_pip_packages }}"
  register: pip_check
  changed_when: false
  failed_when: false
  tags: toolbox

- name: Install missing pip packages for user in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    pip install --user {{ item.item }}
  loop: "{{ pip_check.results }}"
  when: item.rc != 0
  changed_when: true
  tags: toolbox

# SDKMAN is installed to ~/.sdkman (shared home, so the stat runs on the host).
- name: Check if SDKMAN is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.sdkman/bin/sdkman-init.sh"
  register: sdkman_init
  tags: toolbox

- name: Install SDKMAN in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    bash -c 'curl -s "https://get.sdkman.io" | bash'
  when: not sdkman_init.stat.exists
  changed_when: true
  tags: toolbox

- name: Add SDKMAN init to ~/.bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK sdkman"
    block: |
      export SDKMAN_DIR="$HOME/.sdkman"
      [[ -s "$HOME/.sdkman/bin/sdkman-init.sh" ]] && source "$HOME/.sdkman/bin/sdkman-init.sh"
  tags: toolbox

# Check candidate presence via the shared home directory; no need to enter the toolbox.
- name: Check installed SDKMAN candidates
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.sdkman/candidates/{{ item }}/current"
  loop: "{{ toolbox_sdkman_candidates }}"
  register: sdkman_candidates
  tags: toolbox

- name: Install missing SDKMAN candidates in toolbox
  ansible.builtin.command: >
    toolbox run --container {{ toolbox_name }}
    bash -c 'source ~/.sdkman/bin/sdkman-init.sh && sdk install {{ item.item }}'
  loop: "{{ sdkman_candidates.results }}"
  when: not item.stat.exists
  changed_when: true
  tags: toolbox
