---
# Install and enable specific extensions via Ansible is deferred (Shell version / UUID pins).
# Use Extension Manager (installed by the flatpaks role) to browse and enable extensions.
- name: Ensure GNOME Shell user extension directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/gnome-shell/extensions"
    state: directory
    mode: "0755"
