---
- name: Check dnf availability
  ansible.builtin.command: command -v dnf
  register: package_manager_dnf_check
  changed_when: false
  failed_when: false

- name: Explain dnf prerequisite when missing
  ansible.builtin.assert:
    that:
      - package_manager_dnf_check.rc == 0
    fail_msg: "dnf is required for package_manager_dnf."

- name: "Install dnf packages: {{ package_manager_dnf_packages | join(', ') }}"
  ansible.builtin.command: >
    sudo dnf install -y {{ package_manager_dnf_packages | join(' ') }}
  register: package_manager_dnf_install
  changed_when: "'Nothing to do.' not in package_manager_dnf_install.stdout"
  when: package_manager_dnf_packages | length > 0
