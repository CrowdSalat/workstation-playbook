---
- name: Set git user name
  ansible.builtin.git_config:
    name: user.name
    value: "{{ tool_git_user_name }}"
    scope: global

- name: Set git user email
  ansible.builtin.git_config:
    name: user.email
    value: "{{ tool_git_user_email }}"
    scope: global

- name: Set default branch name for new repositories
  ansible.builtin.git_config:
    name: init.defaultBranch
    value: "{{ tool_git_default_branch }}"
    scope: global

- name: Enable automatic upstream creation on first push
  ansible.builtin.git_config:
    name: push.autoSetupRemote
    value: "true"
    scope: global

- name: Enable SSH signing for commits
  ansible.builtin.git_config:
    name: "{{ git_setting.name }}"
    value: "{{ git_setting.value }}"
    scope: global
  loop:
    - { name: commit.gpgsign, value: "true" }
    - { name: gpg.format, value: "ssh" }
    - { name: user.signingkey, value: "{{ tool_git_signing_key }}" }
  loop_control:
    loop_var: git_setting
  when:
    - tool_git_enable_ssh_signing | bool
    - tool_git_signing_key | length > 0

- name: Enable git completion in bashrc
  ansible.builtin.blockinfile:
    path: "{{ tool_git_bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - git completion"
    block: |
      for _git_completion in {{ tool_git_completion_candidates | map('quote') | join(' ') }}; do
        if [ -r "${_git_completion}" ]; then
          . "${_git_completion}"
          break
        fi
      done
      unset _git_completion
    create: true
    insertafter: EOF

- name: Enable git completion in zshrc
  ansible.builtin.blockinfile:
    path: "{{ tool_git_zshrc }}"
    marker: "# {mark} ANSIBLE MANAGED - git completion"
    block: |
      autoload -Uz compinit bashcompinit
      compinit
      bashcompinit
      for _git_completion in {{ tool_git_completion_candidates | map('quote') | join(' ') }}; do
        if [ -r "${_git_completion}" ]; then
          . "${_git_completion}"
          break
        fi
      done
      unset _git_completion
    create: true
    insertafter: EOF
