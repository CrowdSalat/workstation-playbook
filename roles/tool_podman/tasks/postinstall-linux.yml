---
- name: Enable and start Podman socket for current user
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true
    scope: user

- name: Write Testcontainers properties file for Podman
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/.testcontainers.properties"
    content: |
      docker.host=unix:///run/user/{{ ansible_facts['user_uid'] }}/podman/podman.sock
      ryuk.disabled=true
    mode: "0644"

