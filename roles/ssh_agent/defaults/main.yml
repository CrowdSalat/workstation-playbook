---
# Pin matches https://github.com/danielrobbins/keychain/releases
ssh_agent_keychain_version: "2.9.8"
ssh_agent_keychain_url: "https://raw.githubusercontent.com/danielrobbins/keychain/{{ ssh_agent_keychain_version }}/keychain"

ssh_agent_enabled: true
# Basenames under ~/.ssh/ passed to keychain (e.g. id_ed25519 -> ~/.ssh/id_ed25519)
ssh_agent_identities:
  - id_ed25519

# Managed block in ~/.ssh/config (Host * …)
ssh_agent_manage_ssh_config: true
