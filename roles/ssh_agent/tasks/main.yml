---
- name: Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ local_bin }}"
    state: directory
    mode: "0755"
  when: ssh_agent_enabled | bool
  tags: [ssh_agent]

- name: Install keychain script to local bin
  ansible.builtin.get_url:
    url: "{{ ssh_agent_keychain_url }}"
    dest: "{{ local_bin }}/keychain"
    mode: "0755"
    force: true
  when: ssh_agent_enabled | bool
  tags: [ssh_agent]

- name: Add SSH agent snippet to bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - ssh_agent"
    block: |
      # Prefer existing agent (GNOME session / keyring); else keychain for SSH/tty/toolbox.
      if [ -n "${SSH_AUTH_SOCK:-}" ] && [ -S "${SSH_AUTH_SOCK}" ]; then
        :
      elif command -v keychain >/dev/null 2>&1; then
        eval "$({{ local_bin }}/keychain --eval --quiet {{ ssh_agent_identities | join(' ') }})"
      fi
    create: true
    insertafter: EOF
  when: ssh_agent_enabled | bool
  tags: [ssh_agent]

- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"
  when: ssh_agent_enabled | bool and ssh_agent_manage_ssh_config | bool
  tags: [ssh_agent]

- name: Add SSH client defaults for agent use
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    marker: "# {mark} ANSIBLE MANAGED - ssh_agent"
    block: |
      Host *
        AddKeysToAgent yes
        IdentitiesOnly yes
    create: true
    mode: "0600"
  when: ssh_agent_enabled | bool and ssh_agent_manage_ssh_config | bool
  tags: [ssh_agent]
