---
# Layers packages into the Silverblue base image via rpm-ostree.
# A reboot is required for changes to take effect.

- name: Enable COPR for packages that need it
  ansible.builtin.get_url:
    url: "https://copr.fedorainfracloud.org/coprs/{{ item.copr }}/repo/fedora-{{ ansible_facts['distribution_major_version'] }}/{{ item.copr | replace('/', '-') }}-fedora-{{ ansible_facts['distribution_major_version'] }}.repo"
    dest: "/etc/yum.repos.d/{{ item.copr | replace('/', '-') }}.repo"
    mode: "0644"
  loop: "{{ rpm_ostree_packages | selectattr('copr', 'defined') | list }}"
  become: true
  tags: rpm_ostree

- name: Layer packages with rpm-ostree
  ansible.builtin.command:
    cmd: "rpm-ostree install --idempotent --allow-inactive {{ rpm_ostree_packages | map(attribute='name') | join(' ') }}"
  register: rpm_ostree_result
  changed_when: "'No change.' not in rpm_ostree_result.stdout"
  tags: rpm_ostree

- name: Remind user to reboot
  ansible.builtin.debug:
    msg: "rpm-ostree changes staged. Run 'systemctl reboot' to apply."
  when: rpm_ostree_result.changed
  tags: rpm_ostree
