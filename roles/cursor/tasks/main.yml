---
- name: Fetch Cursor download metadata
  ansible.builtin.uri:
    url: "{{ cursor_appimage_url }}"
    return_content: true
  register: cursor_download_info

- name: Download Cursor AppImage (x86_64)
  ansible.builtin.get_url:
    url: "{{ (cursor_download_info.content | from_json).downloadUrl }}"
    dest: "{{ applications_dir }}/cursor.AppImage"
    mode: "0755"
    force: true

- name: Cursor .desktop launcher
  ansible.builtin.copy:
    dest: "{{ local_share_apps }}/cursor.desktop"
    content: |
      [Desktop Entry]
      Name=Cursor
      Comment=AI-powered IDE
      Exec={{ applications_dir }}/cursor.AppImage %F
      Icon=cursor
      Type=Application
      Categories=Development;IDE;TextEditor;
      MimeType=text/plain;inode/directory;
      StartupWMClass=Cursor
    mode: "0644"
