---
- name: Check rpm-ostree availability
  ansible.builtin.command: command -v rpm-ostree
  register: package_manager_rpm_ostree_check
  changed_when: false
  failed_when: false

- name: Explain rpm-ostree prerequisite when missing
  ansible.builtin.assert:
    that:
      - package_manager_rpm_ostree_check.rc == 0
    fail_msg: "rpm-ostree is required for package_manager_rpm_ostree."

- name: Enable COPR repositories for rpm-ostree packages
  ansible.builtin.get_url:
    url: "https://copr.fedorainfracloud.org/coprs/{{ rpm_pkg.copr }}/repo/fedora-{{ ansible_facts['distribution_major_version'] }}/{{ rpm_pkg.copr | replace('/', '-') }}-fedora-{{ ansible_facts['distribution_major_version'] }}.repo"
    dest: "/etc/yum.repos.d/{{ rpm_pkg.copr | replace('/', '-') }}.repo"
    mode: "0644"
  loop: "{{ package_manager_rpm_ostree_packages | selectattr('copr', 'defined') | list }}"
  loop_control:
    loop_var: rpm_pkg
    label: "{{ rpm_pkg.copr }}"
  become: true

- name: "Layer rpm-ostree packages: {{ package_manager_rpm_ostree_packages | map(attribute='name') | join(', ') }}"
  ansible.builtin.command:
    cmd: "rpm-ostree install --idempotent --allow-inactive {{ package_manager_rpm_ostree_packages | map(attribute='name') | join(' ') }}"
  register: package_manager_rpm_ostree_result
  changed_when: "'No change.' not in package_manager_rpm_ostree_result.stdout"
  become: true
  when: package_manager_rpm_ostree_packages | length > 0

- name: Remind reboot for staged rpm-ostree changes
  ansible.builtin.debug:
    msg: "rpm-ostree changes staged. Reboot required to apply."
  when:
    - package_manager_rpm_ostree_packages | length > 0
    - package_manager_rpm_ostree_result.changed
