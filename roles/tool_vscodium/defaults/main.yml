---
# Manage VSCodium settings via Ansible (will overwrite manual changes)
tool_vscodium_manage_settings: true

# Extensions to install
# Simple format for extensions available in configured registry:
#   - publisher.extension-name
# For specific versions or sources, use mapping format:
#   - marketplace:
#       publisher: PublisherName
#       extension: extension-name
#       version: "1.2.3"
tool_vscodium_extensions:
  - stuart.unique-window-colors
  - JetBrains.kotlin-server
  - timheuer.pfx-view
