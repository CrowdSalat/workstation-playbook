---
- name: Download VSIX from URL
  ansible.builtin.get_url:
    url: "{{ ext_item.url }}"
    dest: "{{ tool_vscodium_vsix_cache_dir }}/{{ ext_item.url | basename | regex_replace('\\?.*$', '') }}"
    mode: "0644"
    force: true

- name: Install VSCodium extension from URL VSIX
  ansible.builtin.command:
    argv: "{{ tool_vscodium_extension_install_argv + [tool_vscodium_vsix_cache_dir ~ '/' ~ (ext_item.url | basename | regex_replace('\\?.*$', ''))] }}"
  register: tool_vscodium_ext_vsix_url
  changed_when: >-
    'already installed' not in
    ((tool_vscodium_ext_vsix_url.stdout | default('')) ~ (tool_vscodium_ext_vsix_url.stderr | default(''))) | lower
  failed_when: tool_vscodium_ext_vsix_url.rc != 0
