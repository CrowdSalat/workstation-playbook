---
- name: Ensure VSCodium config directory exists
  ansible.builtin.file:
    path: "{{ _vscodium_config_dir }}"
    state: directory
    mode: "0755"

- name: Template VSCodium settings.json
  ansible.builtin.template:
    src: settings.json.j2
    dest: "{{ _vscodium_config_dir }}/settings.json"
    mode: "0644"
  when: tool_vscodium_manage_settings

- name: Set platform-specific product.json path
  ansible.builtin.set_fact:
    _vscodium_product_json_path: "{{ _vscodium_product_json_macos if ansible_facts['system'] == 'Darwin' else _vscodium_product_json_linux }}"

- name: Ensure product.json directory exists
  ansible.builtin.file:
    path: "{{ _vscodium_product_json_path | dirname }}"
    state: directory
    mode: "0755"

- name: Enable Microsoft VS Marketplace in VSCodium
  ansible.builtin.copy:
    src: product.json
    dest: "{{ _vscodium_product_json_path }}"
    mode: "0644"

- name: Define extension installation command
  ansible.builtin.set_fact:
    _vscodium_install_cmd: "{{ ['/Applications/VSCodium.app/Contents/Resources/app/bin/codium', '--install-extension'] if ansible_facts['system'] == 'Darwin' else ['flatpak', 'run', _vscodium_flatpak_id, '--install-extension'] }}"

- name: Install VSCodium extensions
  ansible.builtin.command:
    argv: "{{ _vscodium_install_cmd + [item] }}"
  register: _vscodium_ext_result
  changed_when: "'already installed' not in (_vscodium_ext_result.stdout | default('') | lower) and 'already installed' not in (_vscodium_ext_result.stderr | default('') | lower)"
  failed_when: _vscodium_ext_result.rc != 0
  loop: "{{ tool_vscodium_extensions | reject('mapping') | list }}"
  when: tool_vscodium_extensions | length > 0

- name: Add code shell function to bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - vscodium code alias"
    block: |
      {% if ansible_facts["system"] == "Darwin" %}
      code() {
        open -a "VSCodium" "$@" >/dev/null 2>&1 &
      }
      {% else %}
      code() {
        flatpak run {{ _vscodium_flatpak_id }} "$@" >/dev/null 2>&1 &
      }
      {% endif %}
    create: true
    insertafter: EOF

- name: Add codium shell function to bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - vscodium codium alias"
    block: |
      {% if ansible_facts["system"] == "Darwin" %}
      codium() {
        open -a "VSCodium" "$@" >/dev/null 2>&1 &
      }
      {% else %}
      codium() {
        flatpak run {{ _vscodium_flatpak_id }} "$@" >/dev/null 2>&1 &
      }
      {% endif %}
    create: true
    insertafter: EOF
