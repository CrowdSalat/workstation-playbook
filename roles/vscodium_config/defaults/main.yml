---
vscodium_config_dir: "{{ ansible_facts['env']['HOME'] }}/.config/VSCodium/User"
vscodium_settings: "{{ vscodium_config_dir }}/settings.json"
toolbox_name: "fedora-toolbox-41"

# Downloaded VSIX files (Marketplace / URL) land here before install.
vscodium_vsix_cache_dir: "{{ ansible_facts['env']['HOME'] }}/.cache/vscodium-vsix"

vscodium_terminal_json: |
  {
      "terminal.integrated.profiles.linux": {
          "Toolbox (host-spawn)": {
              "path": "flatpak-spawn",
              "args": ["--host", "toolbox", "run", "{{ toolbox_name }}", "bash"]
          }
      },
      "terminal.integrated.defaultProfile.linux": "Toolbox (host-spawn)"
  }

# Mix of:
#   - Plain string: publisher.extension (Open VSX / Codium default registry)
#   - url: https://.../something.vsix
#   - marketplace: Visual Studio Marketplace VSIX (publisher, extension short name, version from marketplace page)
#
# Requires VSCodium Flatpak (flatpaks role). Marketplace/URL steps need network.
vscodium_extensions:
  - stuart.unique-window-colors
  - marketplace:
      publisher: TimHeuer
      extension: pfx-view
      version: "0.1.10"
