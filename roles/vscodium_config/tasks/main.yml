---
# VSCodium Flatpak is installed by the flatpaks role (per-user).

- name: Ensure VSCodium config directory exists
  ansible.builtin.file:
    path: "{{ vscodium_config_dir }}"
    state: directory
    mode: "0755"

- name: Stat VSCodium settings
  ansible.builtin.stat:
    path: "{{ vscodium_settings }}"
  register: vscodium_settings_stat

- name: Write initial VSCodium settings (toolbox terminal)
  ansible.builtin.copy:
    dest: "{{ vscodium_settings }}"
    content: "{{ vscodium_terminal_json }}"
    force: false

- name: Write terminal config fragment for merge
  ansible.builtin.copy:
    dest: "{{ vscodium_config_dir }}/ansible_terminal_fragment.json"
    content: "{{ vscodium_terminal_json }}"
    mode: "0644"
  when: vscodium_settings_stat.stat.exists and vscodium_settings_stat.stat.size > 0

- name: Merge toolbox terminal into existing VSCodium settings
  ansible.builtin.shell: |
    tmp=$(mktemp)
    jq -s '.[0] * .[1]' "{{ vscodium_settings }}" "{{ vscodium_config_dir }}/ansible_terminal_fragment.json" > "$tmp" && mv "$tmp" "{{ vscodium_settings }}"
    rm -f "{{ vscodium_config_dir }}/ansible_terminal_fragment.json"
  when: vscodium_settings_stat.stat.exists and vscodium_settings_stat.stat.size > 0
  register: vscodium_merge
  changed_when: vscodium_merge.rc == 0
  failed_when: vscodium_merge.rc != 0

- name: Ensure VSIX cache directory exists
  ansible.builtin.file:
    path: "{{ vscodium_vsix_cache_dir }}"
    state: directory
    mode: "0755"
  when: vscodium_extensions | length > 0

- name: Install VSCodium extensions by id (Open VSX / default registry)
  ansible.builtin.command:
    argv:
      - flatpak
      - run
      - com.vscodium.codium
      - --install-extension
      - "{{ item }}"
  register: vscodium_ext_install
  changed_when: >-
    'already installed' not in
    ((vscodium_ext_install.stdout | default('')) ~ (vscodium_ext_install.stderr | default(''))) | lower
  failed_when: vscodium_ext_install.rc != 0
  loop: "{{ vscodium_extensions | reject('mapping') | list }}"
  when: vscodium_extensions | length > 0

- name: Install VSCodium extensions from VSIX URLs
  ansible.builtin.include_tasks: extension_url.yml
  loop: "{{ vscodium_extensions | select('mapping') | selectattr('url', 'defined') | list }}"
  loop_control:
    loop_var: ext_item
  when: vscodium_extensions | length > 0

- name: Install VSCodium extensions from Visual Studio Marketplace VSIX
  ansible.builtin.include_tasks: extension_marketplace.yml
  loop: "{{ vscodium_extensions | select('mapping') | selectattr('marketplace', 'defined') | list }}"
  loop_control:
    loop_var: ext_item
  when: vscodium_extensions | length > 0

- name: Add code shell function to bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - vscodium code alias"
    block: |
      code() {
        flatpak run com.vscodium.codium "$@" >/dev/null 2>&1 &
      }
    create: true
    insertafter: EOF

- name: Add codium shell function to bashrc
  ansible.builtin.blockinfile:
    path: "{{ bashrc }}"
    marker: "# {mark} ANSIBLE MANAGED - vscodium codium alias"
    block: |
      codium() {
        flatpak run com.vscodium.codium "$@" >/dev/null 2>&1 &
      }
    create: true
    insertafter: EOF
