---
- name: Download VSIX from URL
  ansible.builtin.get_url:
    url: "{{ ext_item.url }}"
    dest: "{{ vscodium_vsix_cache_dir }}/{{ ext_item.url | basename | regex_replace('\\?.*$', '') }}"
    mode: "0644"
    force: true

- name: Install VSCodium extension from URL VSIX
  ansible.builtin.command:
    argv:
      - flatpak
      - run
      - com.vscodium.codium
      - --install-extension
      - "{{ vscodium_vsix_cache_dir }}/{{ ext_item.url | basename | regex_replace('\\?.*$', '') }}"
  register: vscodium_ext_vsix_url
  changed_when: >-
    'already installed' not in
    ((vscodium_ext_vsix_url.stdout | default('')) ~ (vscodium_ext_vsix_url.stderr | default(''))) | lower
  failed_when: vscodium_ext_vsix_url.rc != 0
