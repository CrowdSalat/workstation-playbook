---
# Gallery API package (VSIX): https://marketplace.visualstudio.com/_apis/public/gallery/...
- name: Download VSIX from Visual Studio Marketplace
  ansible.builtin.get_url:
    url: >-
      https://marketplace.visualstudio.com/_apis/public/gallery/publishers/{{
      ext_item.marketplace.publisher }}/vsextensions/{{ ext_item.marketplace.extension }}/{{
      ext_item.marketplace.version }}/vspackage
    dest: >-
      {{ vscodium_vsix_cache_dir }}/{{ ext_item.marketplace.publisher }}.{{
      ext_item.marketplace.extension }}-{{ ext_item.marketplace.version }}.vsix
    mode: "0644"
    force: true

- name: Install VSCodium extension from Marketplace VSIX
  ansible.builtin.command:
    argv:
      - flatpak
      - run
      - com.vscodium.codium
      - --install-extension
      - >-
        {{ vscodium_vsix_cache_dir }}/{{ ext_item.marketplace.publisher }}.{{
        ext_item.marketplace.extension }}-{{ ext_item.marketplace.version }}.vsix
  register: vscodium_ext_vsix_msvc
  changed_when: >-
    'already installed' not in
    ((vscodium_ext_vsix_msvc.stdout | default('')) ~ (vscodium_ext_vsix_msvc.stderr | default(''))) | lower
  failed_when: vscodium_ext_vsix_msvc.rc != 0
