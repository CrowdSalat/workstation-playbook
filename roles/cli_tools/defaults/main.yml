---
# CLI tools installed into ~/.local/bin.
# Each entry requires:
#   name: binary name on disk
#   url:  download URL
# For archive downloads, also set:
#   archive_binary: filename of the binary inside the archive
#   archive_subdir: subdirectory prefix inside the archive (optional;
#                   when set, one path component is stripped on extract)

cli_tools:
  - name: argocd
    url: "https://github.com/argoproj/argo-cd/releases/download/v3.4.2/argocd-linux-amd64"

  - name: docker-compose
    url: "https://github.com/docker/compose/releases/download/v5.1.0/docker-compose-linux-x86_64"

  - name: infisical
    url: "https://github.com/Infisical/cli/releases/download/v0.43.72/cli_0.43.72_linux_amd64.tar.gz"
    archive_binary: infisical

  - name: esptool
    url: "https://github.com/espressif/esptool/releases/download/v5.2.0/esptool-v5.2.0-linux-amd64.tar.gz"
    archive_subdir: esptool-linux-amd64
    archive_binary: esptool
