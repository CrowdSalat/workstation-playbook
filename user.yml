---
# Fedora Silverblue workstation setup — user-level, no sudo required.
# Run: ansible-playbook -i inventory/hosts.yml user.yml
# Personal vars (name, email, signing key): copy vars/local.yml.example to vars/local.yml
# For system packages (rpm-ostree / COPR): use system.yml instead.

- name: Fedora Silverblue workstation (user)
  hosts: localhost
  vars_files:
    - vars/main.yml
  pre_tasks:
    - name: Load local vars if present
      ansible.builtin.include_vars: vars/local.yml
      ignore_errors: true
      tags: always
  roles:
    - { role: bootstrap, tags: [bootstrap] }
    - { role: ssh_agent, tags: [ssh_agent] }
    - { role: starship, tags: [starship] }
    # Do not tag the role here: both tags on the role apply to every task, so
    # --tags flatpaks_remove would also run install. Tags live on import_tasks in the role.
    - role: flatpaks
    - { role: gnome_shell_extensions, tags: [gnome_shell_extensions] }
    - { role: vscodium_config, tags: [vscodium_config] }
    - { role: cursor, tags: [cursor] }
    - { role: cli_tools, tags: [cli_tools] }
    - { role: git, tags: [git] }
    - { role: toolbox, tags: [toolbox] }
